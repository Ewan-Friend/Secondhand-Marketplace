name: application
description: "A new Flutter project."
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  supabase_flutter: ^2.10.3
  flutter_svg: ^2.0.9
  flutter_secure_storage: ^9.2.2

   
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  mocktail: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_dotenv: ^5.1.0
  mockito: ^5.4.4
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Italic.ttf
          weight: 400
          style: italic
  assets:
    - assets/logo/logo-static.svg