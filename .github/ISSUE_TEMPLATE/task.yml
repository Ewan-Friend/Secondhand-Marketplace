name: "✨ Feature / Task Request"
description: "Propose a new feature, enhancement, or general task for the project."
title: "[FEATURE]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 📋 Description"

  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "Short, concise description of the feature or task"
      placeholder: "Briefly summarize the feature/task"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔗 Related Issues / Tasks"

- type: input
    id: closes
    attributes:
      label: "Closes"
      description: "Add issue numbers this feature/task will close (e.g., #123). Use the '#' symbol for linking."
      placeholder: "#___"
    
  - type: inpu
    id: relates_to
    attributes:
      label: "Relates to"
      description: "Add related issue numbers (e.g., #456). Use the '#' symbol for linking."
      placeholder: "#___"
  - type: markdown
    attributes:
      value: "## 🔄 Type of Request"

  - type: checkboxes
    id: change_type
    attributes:
      label: "Select the type of request"
      options:
        - label: "New feature"
          required: true
        - label: "Enhancement"
        - label: "Documentation update"
        - label: "Other (please specify below)"
      default: [0]

  - type: input
    id: other_change
    attributes:
      label: "Other Type (if applicable)"
      placeholder: "Specify other type of task"

  - type: markdown
    attributes:
      value: "## 📎 Additional Notes / Mockups"

  - type: textarea
    id: additional_notes
    attributes:
      label: "Additional Notes"
      description: "Screenshots, design mockups, references, or extra context if applicable"
      placeholder: "Add any supporting information here"
