name: "Check PR is correctly formatted"

on:
  pull_request:
    branches:
      - dev
    types: [opened, edited, synchronize]

jobs:
  # Checks title is correctly formatted
  check-title-format:
    runs-on: ubuntu-latest
    steps:
      - name: PR Title Convention
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        # Define Regex as "[ABC]: description here"
        run: |
          REGEX="^\[[A-Z]+\]: .+"
          if [[ ! "$PR_TITLE" =~ $REGEX ]]; then
            echo "::error ::PR title must follow format: [ABC]: Your title"
            exit 1
          fi
  # Check a closing tag exists somewhere
  check-closing-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check Closing Tag
        env:
          PR_CONTENT: ${{github.event.pull_request.body}}
        # Define Regex as "Closes #123"
        run: |
          REGEX="[Cc][Ll][Oo][Ss][Ee][Ss][[:space:]]*#[0-9]+"
          if [[ ! "$PR_CONTENT" =~ $REGEX ]]; then
            echo "::error ::PR body must include a closing tag (e.g Closes #123)"
            exit 1
          fi
  # Check the user has checked the type of change made
  check-type-of-change:
    runs-on: ubuntu-latest
    steps:
      - name: Type Of Change is selected
        env:
          PR_CONTENT: ${{github.event.pull_request.body}}
        # Define grep as looking for a [x] after the header within 7 lines
        run: |
          # Looks through lines after header, check if there is a [x] or [X]
          if ! echo "$PR_CONTENT" | grep -A 7 "Type of Change" | grep -qi "\[[x]\]"; then
            echo "::error ::You must select at least one type of change"
            exit 1
          fi


          
