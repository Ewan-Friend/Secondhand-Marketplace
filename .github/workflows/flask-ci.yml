name: Flask CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
  workflow_dispatch:    

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest-cov

    - name: Check formatting standards with Ruff
      working-directory: ./backend
      run: ruff format --check .

    - name: Linting using Ruff
      working-directory: ./backend
      run: ruff check --output-format=github --target-version=py311 .

    # Runs all the tests and the returns a table with the percentages of each.py file is accounted for    
    - name: Run tests and generate a coverage report
      working-directory: ./backend
      env:
        FLASK_ENV: testing
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: .
      run: |
        pytest -v -s --cov=app --cov-report=term-missing test/
