name: Backend CD

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Generate deployment package
      - name: Create deployment package
        run: |
          cd backend
          zip -r ../deploy.zip . -x "*.git*" -x "*__pycache__*" -x "*.pytest_cache*" -x "test/*"
      
      # Step 5: Configure AWS credentials 

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 5: Configure AWS credentials via OIDC
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 6: Upload deployment package to S3
      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://${{ vars.AWS_S3_BUCKET_BACKEND }}/deploy-${{ github.sha }}.zip

      # Step 7: Deploy to Elastic Beanstalk via AWS CLI
      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name secondhand-backend \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket="${{ vars.AWS_S3_BUCKET_BACKEND }}",S3Key="deploy-${{ github.sha }}.zip"

          aws elasticbeanstalk update-environment \
            --application-name secondhand-backend \
            --environment-name Secondhand-backend-env-1 \
            --version-label ${{ github.sha }}

      # # Step 8: Wait for deployment to complete and verify health
      - name: Wait for deployment and verify health
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name secondhand-backend \
            --environment-name Secondhand-backend-env-1

          HEALTH=$(aws elasticbeanstalk describe-environments \
            --application-name secondhand-backend \
            --environment-names Secondhand-backend-env-1 \
            --query "Environments[0].Health" \
            --output text)

          STATUS=$(aws elasticbeanstalk describe-environments \
            --application-name secondhand-backend \
            --environment-names Secondhand-backend-env-1 \
            --query "Environments[0].Status" \
            --output text)

          echo "Environment Health: $HEALTH"
          echo "Environment Status: $STATUS"

          if [ "$HEALTH" != "Green" ]; then
            echo "Deployment failed: Environment health is $HEALTH"
            exit 1
          fi
