# Backend Continuous Deployment to AWS Elastic Beanstalk
# Triggers on push to dev branch and deploys the Flask backend

name: Backend CD

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'  # Only trigger when backend code changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install backend dependencies
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Generate deployment package
      # Creates a zip file of the backend folder for Elastic Beanstalk
      - name: Create deployment package
        run: |
          cd backend
          zip -r ../deploy.zip . -x "*.git*" -x "*__pycache__*" -x "*.pytest_cache*" -x "test/*"

      # Step 5: Deploy to AWS Elastic Beanstalk
      
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: Secondhand-Marketplace 
          environment_name: Secondhand-backend-env-1
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
